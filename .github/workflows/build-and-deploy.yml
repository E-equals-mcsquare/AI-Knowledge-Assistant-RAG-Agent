# ============================================================
# CI/CD Pipeline — AI Knowledge Assistant
# ============================================================
#
# Jobs:
#   1. build-push     — build multi-arch Docker image, push to ECR
#   2. update-manifest — patch k8s/deployment.yaml with new image tag,
#                        commit + push → ArgoCD auto-syncs to EKS
#
# Authentication:
#   Uses GitHub OIDC (no long-lived AWS keys).
#   Requires an IAM role with trust policy for this repo.
#   See docs/github-actions-iam.md for setup instructions.
#
# Required GitHub Secrets:
#   AWS_ROLE_ARN   — arn:aws:iam::XXXXXXXX:role/github-actions-deploy
#
# Required GitHub Variables (Settings → Variables):
#   AWS_REGION     — ap-south-1
#   ECR_REPO       — ai-knowledge-assistant
# ============================================================

name: Deploy

on:
  push:
    branches:
      - main
    paths-ignore:
      - "docs/**"
      - "*.md"
      - ".github/**/*.md"

  # Allow manual trigger from GitHub UI
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for manual deploy"
        required: false
        default: "Manual trigger"

permissions:
  id-token: write   # required for OIDC token
  contents: write   # required to push manifest update back to repo

# Cancel any in-progress run for the same branch
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'ap-south-1' }}
  ECR_REPO:   ${{ vars.ECR_REPO   || 'ai-knowledge-assistant' }}

# ── Job 1: Build & Push ───────────────────────────────────────────────────────
jobs:
  build-push:
    name: Build & Push to ECR
    runs-on: ubuntu-latest

    outputs:
      image: ${{ steps.meta.outputs.image }}
      tag:   ${{ steps.meta.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── AWS Auth (OIDC — no static credentials) ──────────────────────────
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region:     ${{ env.AWS_REGION }}

      # ── ECR Login ─────────────────────────────────────────────────────────
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # ── Set image metadata ─────────────────────────────────────────────────
      - name: Set image tag
        id: meta
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          IMAGE="${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPO }}"
          echo "image=${IMAGE}:${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "tag=${SHORT_SHA}"            >> "$GITHUB_OUTPUT"
          echo "IMAGE_URI=${IMAGE}:${SHORT_SHA}" >> "$GITHUB_ENV"

      # ── Docker Buildx (multi-arch) ─────────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPO }}:${{ steps.meta.outputs.tag }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPO }}:latest
          # Layer cache stored in ECR — speeds up subsequent builds
          cache-from: type=registry,ref=${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPO }}:cache
          cache-to:   type=registry,ref=${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPO }}:cache,mode=max

      - name: Summary
        run: |
          echo "### Docker image pushed" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Tag | URI |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----|-----|" >> "$GITHUB_STEP_SUMMARY"
          echo "| \`${{ steps.meta.outputs.tag }}\` | \`${{ steps.meta.outputs.image }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| \`latest\` | \`${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPO }}:latest\` |" >> "$GITHUB_STEP_SUMMARY"

# ── Job 2: Update Manifest → ArgoCD Sync ─────────────────────────────────────
  update-manifest:
    name: Update k8s Manifest & Trigger ArgoCD
    runs-on: ubuntu-latest
    needs: build-push

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Use a token with write access so the push back triggers further workflows
          # (the default GITHUB_TOKEN is fine since we only want ArgoCD to pick it up,
          #  not re-trigger this workflow — paths-ignore handles that)
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      # ── Patch deployment.yaml with the new image URI ──────────────────────
      - name: Update image tag in deployment.yaml
        env:
          NEW_IMAGE: ${{ needs.build-push.outputs.image }}
        run: |
          echo "Patching k8s/deployment.yaml → ${NEW_IMAGE}"

          # Replace the image line (any existing tag) with the new SHA-tagged URI.
          # Match on the repo name so we don't need the registry URL in this job.
          sed -i "s|image: .*/${{ env.ECR_REPO }}:.*|image: ${NEW_IMAGE}|" \
            k8s/deployment.yaml

          # Verify the patch applied
          grep "image:" k8s/deployment.yaml

      # ── Commit & push — ArgoCD detects the diff and auto-syncs ───────────
      - name: Commit and push manifest update
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add k8s/deployment.yaml

          # Only commit if there's actually a change
          if git diff --staged --quiet; then
            echo "No manifest changes — image tag is already up to date."
          else
            git commit -m "ci: update image to ${{ needs.build-push.outputs.tag }} [skip ci]"
            git push origin main
            echo "Manifest pushed — ArgoCD will sync within ~3 minutes."
          fi

      # ── Optional: trigger an immediate ArgoCD sync via the API ────────────
      # Uncomment this step if you want instant rollouts instead of waiting
      # up to 3 minutes for ArgoCD's polling interval.
      #
      # Requires two additional secrets:
      #   ARGOCD_SERVER   — hostname or IP of your ArgoCD server (no https://)
      #   ARGOCD_TOKEN    — ArgoCD API token (Settings → Accounts → Generate Token)
      #
      # - name: Trigger ArgoCD sync
      #   env:
      #     ARGOCD_SERVER: ${{ secrets.ARGOCD_SERVER }}
      #     ARGOCD_TOKEN:  ${{ secrets.ARGOCD_TOKEN }}
      #   run: |
      #     curl -s -X POST \
      #       -H "Authorization: Bearer ${ARGOCD_TOKEN}" \
      #       -H "Content-Type: application/json" \
      #       "https://${ARGOCD_SERVER}/api/v1/applications/ai-knowledge-assistant/sync" \
      #       -d '{"revision":"HEAD","prune":true,"dryRun":false}' | jq .status

      - name: Summary
        run: |
          echo "### Deployment update" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Image: \`${{ needs.build-push.outputs.image }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Manifest: \`k8s/deployment.yaml\` updated and pushed" >> "$GITHUB_STEP_SUMMARY"
          echo "- ArgoCD: auto-syncs within ~3 min (or trigger \`make argocd-sync\` for immediate)" >> "$GITHUB_STEP_SUMMARY"
