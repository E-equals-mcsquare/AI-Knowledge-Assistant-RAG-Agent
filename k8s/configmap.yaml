apiVersion: v1
kind: ConfigMap
metadata:
  name: ai-assistant-config
# Non-sensitive configuration injected as environment variables.
# Sensitive values (OPENAI_API_KEY, PINECONE_API_KEY) live in external-secrets.yaml.
# deployment.yaml picks this up via:  envFrom: - configMapRef: name: ai-assistant-config
data:
  # ── OpenAI ────────────────────────────────────────────────────────────────
  OPENAI_EMBEDDING_MODEL: "text-embedding-3-large"
  OPENAI_CHAT_MODEL: "gpt-4o"
  OPENAI_MAX_TOKENS: "1024"
  OPENAI_TEMPERATURE: "0.2"

  # ── Chunking ──────────────────────────────────────────────────────────────
  CHUNK_SIZE: "800"
  CHUNK_OVERLAP: "150"

  # ── Retrieval ─────────────────────────────────────────────────────────────
  TOP_K: "5"
  SIMILARITY_THRESHOLD: "0.30"

  # ── Vector store ──────────────────────────────────────────────────────────
  VECTOR_STORE_BACKEND: "pinecone"
  PINECONE_INDEX_NAME: "ai-knowledge-assistant-embeddings"
  PINECONE_CLOUD: "aws"
  PINECONE_REGION: "us-east-1"
  PINECONE_EMBEDDING_DIM: "3072"

  # ── Document store ────────────────────────────────────────────────────────
  DOCUMENT_STORE_BACKEND: "s3"
  AWS_REGION: "ap-south-1"
  AWS_BUCKET_NAME: "ai-knowledge-assistant-documents"
  AWS_S3_PREFIX: "documents/"

  # ── Application ───────────────────────────────────────────────────────────
  APP_ENV: "production"
  LOG_LEVEL: "INFO"
  MAX_UPLOAD_SIZE_MB: "50"
